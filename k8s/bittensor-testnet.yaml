---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bt
  namespace: bittensor-testnet

---
# ConfigMap for strategy scheduler
apiVersion: v1
kind: ConfigMap
metadata:
  name: bt-strategy-config
  namespace: bittensor-testnet
data:
  SCHEDULE_EVALUATOR_INTERVAL_HOURS: "6"
  SCHEDULE_SNAPSHOT_TIME: "00:00"
  SCHEDULE_ECONOMICS_TIME: "01:00"
  SCHEDULE_DRY_RUN: "true"
  LOG_LEVEL: "DEBUG"

---
# Headless Service required by the StatefulSet for stable pod DNS
apiVersion: v1
kind: Service
metadata:
  name: bt-validator
  namespace: bittensor-testnet
  labels:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: validator
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: validator
  ports: []

---
# Validator StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bt-validator
  namespace: bittensor-testnet
  labels:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: validator
spec:
  serviceName: bt-validator
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bt
      app.kubernetes.io/component: validator
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bt
        app.kubernetes.io/component: validator
    spec:
      serviceAccountName: bt
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: validator
        image: ghcr.io/0xpuncker/lab-bittensor:10.3.0-c56b6ae
        imagePullPolicy: Always
        command:
          - python
          - neurons/validator.py
          - --wallet.name
          - testnet-validator
          - --wallet.hotkey
          - default
          - --netuid
          - "1"
          - --subtensor.network
          - test
          - --axon.port
          - "8091"
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
        env:
        - name: HOME
          value: /home/valbittensor
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: BT_SUBTENSOR_NETWORK
          value: test
        - name: BT_NETUID
          value: "1"
        livenessProbe:
          exec:
            command:
              - pgrep
              - -f
              - python.*neurons/validator.py
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 30
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - pgrep
              - -f
              - python.*neurons/validator.py
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: wallet
          mountPath: /home/valbittensor/.bittensor/wallets/testnet-validator/coldkey
          subPath: coldkey
          readOnly: true
        - name: wallet
          mountPath: /home/valbittensor/.bittensor/wallets/testnet-validator/coldkeypub.txt
          subPath: coldkeypub.txt
          readOnly: true
        - name: wallet
          mountPath: /home/valbittensor/.bittensor/wallets/testnet-validator/hotkeys/default
          subPath: hotkey-default
          readOnly: true
        - name: state
          mountPath: /home/valbittensor/.bittensor/miners
      volumes:
      - name: wallet
        secret:
          secretName: bt-wallet
  volumeClaimTemplates:
  - metadata:
      name: state
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# Headless Service for miner StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: bt-miner
  namespace: bittensor-testnet
  labels:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: miner
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: miner
  ports: []

---
# Miner StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bt-miner
  namespace: bittensor-testnet
  labels:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: miner
spec:
  serviceName: bt-miner
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bt
      app.kubernetes.io/component: miner
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bt
        app.kubernetes.io/component: miner
    spec:
      serviceAccountName: bt
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      terminationGracePeriodSeconds: 60
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: miner
        image: ghcr.io/0xpuncker/lab-bittensor:10.3.0-539e7af
        imagePullPolicy: Always
        command:
          - python
          - neurons/miner.py
          - --wallet.name
          - testnet-validator
          - --wallet.hotkey
          - miner
          - --netuid
          - "1"
          - --subtensor.network
          - test
          - --axon.port
          - "8092"
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: 200m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
        env:
        - name: HOME
          value: /home/valbittensor
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: BT_SUBTENSOR_NETWORK
          value: test
        - name: BT_NETUID
          value: "1"
        livenessProbe:
          exec:
            command:
              - pgrep
              - -f
              - python.*neurons/miner.py
          initialDelaySeconds: 120
          periodSeconds: 60
          timeoutSeconds: 30
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
              - pgrep
              - -f
              - python.*neurons/miner.py
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: wallet
          mountPath: /home/valbittensor/.bittensor/wallets/testnet-validator/coldkey
          subPath: coldkey
          readOnly: true
        - name: wallet
          mountPath: /home/valbittensor/.bittensor/wallets/testnet-validator/coldkeypub.txt
          subPath: coldkeypub.txt
          readOnly: true
        - name: wallet
          mountPath: /home/valbittensor/.bittensor/wallets/testnet-validator/hotkeys/miner
          subPath: hotkey-miner
          readOnly: true
        - name: state
          mountPath: /home/valbittensor/.bittensor/miners
      volumes:
      - name: wallet
        secret:
          secretName: bt-wallet
  volumeClaimTemplates:
  - metadata:
      name: state
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi

---
# PVC for strategy alpha_history.db — survives pod restarts.
# alpha_snapshot.py writes to .data/alpha_history.db relative to /app CWD.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bt-strategy-data
  namespace: bittensor-testnet
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Strategy Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bt-strategy
  namespace: bittensor-testnet
  labels:
    app.kubernetes.io/name: bt
    app.kubernetes.io/component: strategy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bt
      app.kubernetes.io/component: strategy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bt
        app.kubernetes.io/component: strategy
    spec:
      serviceAccountName: bt
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: strategy
        image: ghcr.io/0xpuncker/lab-bittensor:10.3.0-c56b6ae
        imagePullPolicy: Always
        command:
        - python
        - strategy/scheduler.py
        - --netuid
        - "1"
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
        env:
        - name: HOME
          value: /home/valbittensor
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: SCHEDULE_EVALUATOR_INTERVAL_HOURS
          valueFrom:
            configMapKeyRef:
              name: bt-strategy-config
              key: SCHEDULE_EVALUATOR_INTERVAL_HOURS
        - name: SCHEDULE_SNAPSHOT_TIME
          valueFrom:
            configMapKeyRef:
              name: bt-strategy-config
              key: SCHEDULE_SNAPSHOT_TIME
        - name: SCHEDULE_ECONOMICS_TIME
          valueFrom:
            configMapKeyRef:
              name: bt-strategy-config
              key: SCHEDULE_ECONOMICS_TIME
        - name: SCHEDULE_DRY_RUN
          valueFrom:
            configMapKeyRef:
              name: bt-strategy-config
              key: SCHEDULE_DRY_RUN
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: bt-strategy-config
              key: LOG_LEVEL
        - name: BT_SUBTENSOR_NETWORK
          value: test
        - name: BT_NETUID
          value: "1"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - python.*strategy/scheduler.py
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pgrep
            - -f
            - python.*strategy/scheduler.py
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        volumeMounts:
        - name: data
          mountPath: /app/.data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bt-strategy-data
